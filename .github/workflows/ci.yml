name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: python -m ruff check src tests

      - name: Typecheck backend
        working-directory: backend
        run: python -m mypy src tests

      - name: Test backend
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test user-web game logic
        working-directory: frontend/apps/user-web
        run: node --test src/gameplay/gameLogic.test.ts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Start backend API
        working-directory: backend
        env:
          SHEEPPARTER_ENV: test
          SHEEPPARTER_DATABASE_URL: sqlite+pysqlite:///./data/ci-e2e.sqlite3
          SHEEPPARTER_SEED_DEMO_USER: "true"
        run: |
          python -m uvicorn sheepparter.main:app --host 127.0.0.1 --port 8000 &
          echo $! > "$RUNNER_TEMP/backend.pid"

      - name: Wait for backend API
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Build user-web
        working-directory: frontend
        run: npm run build --workspace @sheepparter/user-web

      - name: Start user-web preview
        working-directory: frontend
        run: |
          npm run preview --workspace @sheepparter/user-web -- --host 127.0.0.1 &
          echo $! > "$RUNNER_TEMP/user-web.pid"

      - name: Wait for user-web preview
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run E2E smoke checks
        run: |
          node <<'EOF'
          const apiBase = "http://127.0.0.1:8000";
          const webBase = "http://127.0.0.1:4173";

          const health = await fetch(`${apiBase}/api/v1/health`);
          if (!health.ok) {
            throw new Error(`Health check failed: ${health.status}`);
          }

          const login = await fetch(`${apiBase}/api/v1/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: "demo@sheepparter.test",
              password: "LearnChinese123"
            })
          });
          if (!login.ok) {
            throw new Error(`Login failed: ${login.status}`);
          }

          const cookie = login.headers.get("set-cookie");
          if (!cookie?.includes("sheepparter_session=")) {
            throw new Error("Login did not return the session cookie.");
          }

          const me = await fetch(`${apiBase}/api/v1/auth/me`, {
            headers: { Cookie: cookie.split(";")[0] }
          });
          if (!me.ok) {
            throw new Error(`Current user check failed: ${me.status}`);
          }

          const html = await (await fetch(webBase)).text();
          if (!html.includes('id="root"')) {
            throw new Error("User-web preview did not render the React root.");
          }
          EOF

      - name: Stop preview services
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/user-web.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/user-web.pid")" || true
          fi
          if [ -f "$RUNNER_TEMP/backend.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/backend.pid")" || true
          fi
